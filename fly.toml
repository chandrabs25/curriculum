app = "curriculum-api-chandrabs25"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  CURRICULUM_USE_VECTOR = "1"
  CORS_ALLOW_ORIGINS = "https://curriculum-frontend.22f3002048.workers.dev"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
